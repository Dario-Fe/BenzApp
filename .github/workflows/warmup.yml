name: JSON Data Generator

on:
  schedule:
    - cron: '5,35 8-13 * * *' # Alle :05 e :35 di ogni ora dalle 08:00 alle 13:59 UTC
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate JSON data
        run: node scripts/generate_data.js

      - name: Commit and push changes
        run: |
          git config --global user.name "BenzUp Bot"
          git config --global user.email "benzup-bot@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati JSON."
          else
            git commit -m "chore: aggiornamento dati carburanti $(date -u +%Y-%m-%d)"
            git push
          fi
