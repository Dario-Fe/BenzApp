name: JSON Data Generator

on:
  schedule:
    - cron: '*/30 8-14 * * *' # Ogni 30 minuti dalle 08:00 alle 14:00 UTC
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate JSON data
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          const PROVINCES = ['AL', 'AT', 'BI', 'CN', 'NO', 'TO', 'VB', 'VC'];
          const ANAGRAFICA_URL = 'https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv';
          const PREZZI_URL = 'https://www.mimit.gov.it/images/exportCSV/prezzo_alle_8.csv';

          async function fetchWithRetry(url, method = 'GET') {
            return new Promise((resolve, reject) => {
              const req = https.request(url, { method }, (res) => {
                if (method === 'HEAD') {
                  resolve(res.headers);
                  return;
                }
                let data = '';
                res.on('data', (chunk) => (data += chunk));
                res.on('end', () => resolve(data));
              });
              req.on('error', reject);
              req.end();
            });
          }

          function parseCSV(text) {
            const lines = text.split('\n').filter((l) => l.trim());
            const dataLine = lines[0]; // e.g. 'Estrazione del 2026-03-30'
            const dateMatch = dataLine.match(/(\d{4}-\d{2}-\d{2})/);
            const extractionDate = dateMatch ? dateMatch[1] : null;
            return { lines, extractionDate };
          }

          async function run() {
            console.log('--- Inizio Generazione JSON ---');
            const today = new Date().toISOString().split('T')[0];

            // 1. Controllo Last-Modified MIMIT
            const headers = await fetchWithRetry(ANAGRAFICA_URL, 'HEAD');
            const lastModified = headers['last-modified'];
            // mimitDate è la data di pubblicazione del file (oggi se aggiornato)
            const mimitPubDate = lastModified ? new Date(lastModified).toISOString().split('T')[0] : null;
            
            console.log(\`Data pubblicazione MIMIT (Last-Modified): \${mimitPubDate}\`);
            console.log(\`Data di oggi (UTC): \${today}\`);

            if (mimitPubDate !== today) {
              console.log('MIMIT non ancora aggiornato per la data odierna. Termino.');
              return;
            }

            // 2. Download CSV per leggere la extractionDate interna
            console.log('Download CSV per verifica data interna...');
            const anagraficaText = await fetchWithRetry(ANAGRAFICA_URL);
            const { lines: aLines, extractionDate } = parseCSV(anagraficaText);
            
            console.log(\`Data di estrazione nel file MIMIT: \${extractionDate}\`);

            // 3. Controllo se abbiamo già processato questa specifica extractionDate
            try {
              const currentData = JSON.parse(fs.readFileSync('data/VB.json', 'utf8'));
              if (currentData.extractionDate === extractionDate && extractionDate !== '1970-01-01') {
                console.log('Dati con questa extractionDate già presenti. Termino.');
                return;
              }
            } catch (e) {
              console.log('File locale non trovato o extractionDate diversa. Procedo.');
            }

            // 4. Download Prezzi
            console.log('Download prezzi in corso...');
            const prezziText = await fetchWithRetry(PREZZI_URL);
            const { lines: pLines } = parseCSV(prezziText);

            // 5. Parsing Prezzi
            console.log('Parsing prezzi...');
            const prezzi = {};
            for (let i = 2; i < pLines.length; i++) {
              const cols = pLines[i].split('|');
              if (cols.length >= 5) {
                const id = cols[0].trim();
                let carburante = cols[1].trim().toLowerCase();
                if (carburante.includes('gpl')) carburante = 'gpl';
                if (carburante.includes('metano')) carburante = 'metano';
                
                const prezzo = parseFloat(cols[2].trim());
                const isSelf = cols[3].trim() === '1';
                const dtComu = cols[4].trim();
                
                if (!prezzi[id]) prezzi[id] = { all: [] };
                const key = isSelf ? \`\${carburante}_self\` : \`\${carburante}_servito\`;
                prezzi[id][key] = { prezzo, dtComu };
                prezzi[id].all.push({ carburante: cols[1].trim(), prezzo, isSelf, dtComu });
              }
            }

            // 6. Generazione JSON per provincia
            console.log('Generazione file per provincia...');
            const timestamp = new Date().toISOString();
            
            for (const prov of PROVINCES) {
              const distributori = [];
              for (let i = 2; i < aLines.length; i++) {
                const cols = aLines[i].split('|');
                if (cols.length >= 10 && cols[7].trim() === prov) {
                  const id = cols[0].trim();
                  const p = prezzi[id] || {};
                  distributori.push({
                    id,
                    nome: cols[4].trim(),
                    gestore: cols[1].trim(),
                    bandiera: cols[2].trim(),
                    indirizzo: cols[5].trim(),
                    comune: cols[6].trim(),
                    lat: parseFloat(cols[8].trim()),
                    lng: parseFloat(cols[9].trim()),
                    benzina_self: p.benzina_self?.prezzo ?? null,
                    benzina_servito: p.benzina_servito?.prezzo ?? null,
                    gasolio_self: p.gasolio_self?.prezzo ?? null,
                    gasolio_servito: p.gasolio_servito?.prezzo ?? null,
                    gpl_self: p.gpl_self?.prezzo ?? null,
                    gpl_servito: p.gpl_servito?.prezzo ?? null,
                    metano_self: p.metano_self?.prezzo ?? null,
                    metano_servito: p.metano_servito?.prezzo ?? null,
                    aggiornato: p.all?.[0]?.dtComu ?? null,
                    prezziDettaglio: p.all ?? []
                  });
                }
              }

              const result = {
                extractionDate,
                generatedAt: timestamp,
                totale: distributori.length,
                distributori
              };

              fs.writeFileSync(\`data/\${prov}.json\`, JSON.stringify(result, null, 2));
              console.log(\`✓ \${prov}: \${distributori.length} distributori\`);
            }
            
            console.log(\`Completato alle: \${timestamp}\`);
          }

          run().catch(err => {
            console.error('Errore critico:', err);
            process.exit(1);
          });
          "

      - name: Commit and push changes
        run: |
          git config --global user.name "BenzUp Bot"
          git config --global user.email "benzup-bot@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati JSON."
          else
            git commit -m "chore: aggiornamento dati carburanti $(date -u +%Y-%m-%d)"
            git push
          fi
