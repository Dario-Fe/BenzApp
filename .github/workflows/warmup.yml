name: CDN Cache Warm-up

on:
  schedule:
    - cron: '5 8 * * *' # 08:05 UTC ogni giorno
  workflow_dispatch: # Permette l'avvio manuale per test

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Warm-up script
        env:
          BENZUP_URL: ${{ secrets.BENZUP_URL }}
        run: |
          node -e "
          async function run() {
            const baseUrl = process.env.BENZUP_URL;
            if (!baseUrl) {
              console.error('ERRORE: Variabile BENZUP_URL non configurata nei Secrets.');
              process.exit(1);
            }

            const cleanBaseUrl = baseUrl.replace(/\/$/, '');
            const mimitCsvUrl = 'https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv';
            const provinces = ['AL', 'AT', 'BI', 'CN', 'NO', 'TO', 'VB', 'VC'];

            async function checkUpdate() {
              console.log('Controllo aggiornamento dati MIMIT...');
              const today = new Date().toISOString().split('T')[0];

              // 1. HEAD a MIMIT per Last-Modified
              const mimitRes = await fetch(mimitCsvUrl, { method: 'HEAD' });
              const lastModified = mimitRes.headers.get('last-modified');
              const mimitDate = lastModified ? new Date(lastModified).toISOString().split('T')[0] : null;

              // 2. GET all'App per extractionDate (usiamo VB come campione)
              const appRes = await fetch(\`\${cleanBaseUrl}/api/carburanti?provincia=VB\`);
              const appData = await appRes.json();
              const appDate = appData.extractionDate;

              console.log(\`Data MIMIT (Last-Modified): \${mimitDate}\`);
              console.log(\`Data App (ExtractionDate): \${appDate}\`);
              console.log(\`Data di oggi: \${today}\`);

              // Logica: il warm-up procede se MIMIT ha pubblicato dati nuovi (mimitDate è oggi)
              // e diversi da quelli che l'app sta servendo.
              // Nota: MIMIT pubblica oggi (X) i dati di ieri (X-1).
              const updated = (mimitDate === today && mimitDate !== appDate);

              return { updated, mimitDate, appDate };
            }

            let check = await checkUpdate();

            if (!check.updated) {
              console.log('Dati non ancora aggiornati o già allineati. Attendo 30 minuti per il secondo tentativo...');
              await new Promise(r => setTimeout(r, 30 * 60 * 1000));
              check = await checkUpdate();
            }

            if (!check.updated) {
              console.log('MIMIT non aggiornato, warm-up non eseguito. Gli utenti riceveranno i dati precedenti fino al prossimo aggiornamento naturale della cache.');
              return;
            }

            console.log('Dati aggiornati rilevati. Inizio warm-up delle province...');
            let successCount = 0;
            let failedProvinces = [];

            for (const prov of provinces) {
              const url = \`\${cleanBaseUrl}/api/carburanti?provincia=\${prov}\`;
              console.log(\`Scaldando \${prov}... (\${url})\`);

              try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);

                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (res.ok) {
                  console.log(\`✓ \${prov} completata con successo.\`);
                  successCount++;
                } else {
                  throw new Error(\`Status \${res.status}\`);
                }
              } catch (err) {
                console.error(\`✗ Errore scaldando \${prov}: \${err.message}\`);
                failedProvinces.push(prov);
              }

              await new Promise(r => setTimeout(r, 2000)); // Attesa 2 secondi tra richieste
            }

            console.log('\n--- Riepilogo Warm-up ---');
            console.log(\`Esito controllo MIMIT: Aggiornato\`);
            console.log(\`Date confrontate: MIMIT (\${check.mimitDate}) vs App (\${check.appDate})\`);
            console.log(\`Province scaldate con successo: \${successCount}\`);
            if (failedProvinces.length > 0) {
              console.log(\`Province fallite: \${failedProvinces.join(', ')}\`);
            }
          }
          run().catch(err => {
            console.error('Errore critico durante il warm-up:', err);
            process.exit(1);
          });
          "
