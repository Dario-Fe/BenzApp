name: Job Scraper Automation

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 AM UTC
    - cron: '0 17 * * *' # 5:00 PM UTC
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Scraper
        run: python scraper_pslp.py --comune "Verbania" --distanza 30 --json annunci_vco.json

      - name: Commit and push changes
        run: |
          git config --global user.name "BenzUp Bot"
          git config --global user.email "bot@benzup.vco"
          git add annunci_vco.json
          git commit -m "Aggiornamento offerte di lavoro (automatico)" || echo "Nessuna modifica da committare"
          git push
