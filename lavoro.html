<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offerte di Lavoro VCO - BenzUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Icone e Web App -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3f6b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: #e2ddd8;
      --text: #1a1816;
      --text-muted: #8a8480;
      --text-light: #b0aba6;
      --accent-work: #1a3f6b;
      --accent-work-light: #e8eef5;
      --accent-date: #b84a2a;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .app-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    .app-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .meta-badge {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .meta-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 3px 8px;
      border-radius: 6px;
    }
    .meta-source {
      font-size: 10px;
      color: var(--text-light);
    }

    /* ── FILTER TOGGLE ── */
    .filter-toggle {
      display: flex;
      gap: 6px;
      padding-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -20px;
      padding-left: 20px;
      padding-right: 20px;
    }
    .filter-toggle::-webkit-scrollbar { display: none; }
    .toggle-btn {
      white-space: nowrap;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface2);
      color: var(--text-muted);
    }
    .toggle-btn.active {
      background: var(--accent-work);
      color: white;
    }

    /* ── MAIN ── */
    main {
      padding: 20px 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── LIST ── */
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .card:active { transform: scale(0.98); }
    .card:hover { box-shadow: var(--shadow-lg); border-color: #ccc; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--accent-work);
    }
    .card-company {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 500;
    }
    .badge-location { background: var(--accent-work-light); color: var(--accent-work); }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .card-date {
      font-size: 11px;
      color: var(--text-light);
    }
    .card-arrow {
      color: var(--text-light);
      font-size: 16px;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }
    .loading-logo {
      width: 64px;
      height: 64px;
      animation: pumpPulse 1.5s ease-in-out infinite;
    }
    @keyframes pumpPulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .loading-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }

    /* ── ERROR ── */
    .error-box {
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      margin-top: 20px;
    }
    .retry-btn {
      margin-top: 14px;
      padding: 10px 20px;
      background: var(--accent-work);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
    }

    /* ── DETAIL PANEL ── */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }
    .detail-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      z-index: 201;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      max-width: 600px;
      margin: 0 auto;
    }
    .detail-panel.open { transform: translateY(0); }
    .detail-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .detail-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent-work);
      margin-bottom: 4px;
    }
    .detail-company {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .detail-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      margin: 20px 0;
    }
    .source-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--accent-work);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 11px;
      color: var(--text-light);
    }

    .card { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title"><img src="icon.svg" class="app-logo" alt="Logo BenzUp"> BenzUp Lavoro</div>
      <div class="app-subtitle">Offerte di lavoro nel VCO</div>
    </div>
    <div class="meta-badge">
      <div class="meta-date" id="meta-date">—</div>
      <div class="meta-source">Fonte: Agenzia Piemonte Lavoro</div>
      <a href="index.html" class="meta-source" style="text-decoration: underline; color: var(--text-muted);">Torna ai Carburanti</a>
    </div>
  </div>
  <div class="filter-toggle" id="filter-container">
    <button class="toggle-btn active" onclick="filterBy('all')">Tutti</button>
  </div>
</div>

<main>
  <div id="app-content">
    <div class="loading">
      <img src="icon.svg" class="loading-logo" alt="Caricamento...">
      <div class="loading-text">Ricerca offerte in corso…</div>
    </div>
  </div>
  <div class="footer">
    Dati aggiornati periodicamente (8:00 e 17:00)<br>
    © BenzUp - Iniziativa per il territorio
  </div>
</main>

<div class="detail-overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-handle"></div>
  <div id="detail-content"></div>
</div>

<script>
  let allAnnunci = [];
  let currentFilter = 'all';

  async function loadAnnunci() {
    try {
      const res = await fetch('/api/lavoro');
      if (!res.ok) throw new Error('Impossibile caricare i dati');
      const data = await res.json();
      allAnnunci = data.annunci || [];

      if (data.extractionDate) {
        const d = new Date(data.extractionDate);
        document.getElementById('meta-date').textContent =
          d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
      }

      renderFilters();
      renderList();
    } catch (e) {
      document.getElementById('app-content').innerHTML = `
        <div class="error-box">
          <p>${e.message}</p>
          <button class="retry-btn" onclick="loadAnnunci()">Riprova</button>
        </div>`;
    }
  }

  function renderFilters() {
    const comuni = [...new Set(allAnnunci.map(a => a.comune))].sort();
    const container = document.getElementById('filter-container');
    container.innerHTML = `<button class="toggle-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterBy('all')">Tutti</button>`;
    comuni.forEach(c => {
      container.innerHTML += `<button class="toggle-btn ${currentFilter === c ? 'active' : ''}" onclick="filterBy('${c}')">${c}</button>`;
    });
  }

  function filterBy(filter) {
    currentFilter = filter;
    document.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.toggle('active', b.innerText === filter || (filter === 'all' && b.innerText === 'Tutti'));
    });
    renderList();
  }

  function renderList() {
    const filtered = currentFilter === 'all'
      ? allAnnunci
      : allAnnunci.filter(a => a.comune === currentFilter);

    if (filtered.length === 0) {
      document.getElementById('app-content').innerHTML = '<div class="loading-text" style="text-align:center">Nessun annuncio trovato.</div>';
      return;
    }

    let html = '<div class="list">';
    filtered.forEach((a, i) => {
      html += `
        <div class="card" onclick="openDetail('${a.id}')" style="animation-delay:${Math.min(i * 30, 300)}ms">
          <div class="card-header">
            <div class="card-title">${esc(a.titolo)}</div>
            <div class="card-arrow">›</div>
          </div>
          <div class="card-company">${esc(a.azienda)}</div>
          <div class="card-meta">
            <span class="badge badge-location">📍 ${esc(a.comune)}</span>
            <span class="badge">${esc(a.contratto)}</span>
          </div>
          <div class="card-footer">
            <div class="card-date">Scade: ${formatDate(a.dataScadenza)}</div>
          </div>
        </div>`;
    });
    html += '</div>';
    document.getElementById('app-content').innerHTML = html;
  }

  function openDetail(id) {
    const a = allAnnunci.find(x => x.id == id);
    if (!a) return;

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-title">${esc(a.titolo)}</div>
      <div class="detail-company">${esc(a.azienda)}</div>
      <div class="card-meta">
        <span class="badge badge-location">📍 ${esc(a.comune)}</span>
        <span class="badge">${esc(a.contratto)}</span>
        <span class="badge">CPI: ${esc(a.cpi)}</span>
      </div>
      <div class="detail-desc">${esc(a.descrizione)}</div>
      <div style="font-size:12px; color:var(--text-light)">Scadenza: ${formatDate(a.dataScadenza)}</div>

      <a class="source-btn" href="${a.link}" target="_blank" rel="noopener">
        Candidati su Piemonte Tu
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
        </svg>
      </a>
    `;

    document.getElementById('overlay').classList.add('open');
    document.getElementById('detail-panel').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDetail() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
    document.body.style.overflow = '';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try {
        const d = new Date(iso);
        return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch(e) { return iso; }
  }

  loadAnnunci();
</script>
</body>
</html>
